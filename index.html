<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Stagemarkt Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(240 10% 3.9%);
      --card: hsl(0 0% 100%);
      --card-foreground: hsl(240 10% 3.9%);
      --popover: hsl(0 0% 100%);
      --popover-foreground: hsl(240 10% 3.9%);
      --primary: hsl(240 5.9% 10%);
      --primary-foreground: hsl(0 0% 98%);
      --secondary: hsl(240 4.8% 95.9%);
      --secondary-foreground: hsl(240 5.9% 10%);
      --muted: hsl(240 4.8% 95.9%);
      --muted-foreground: hsl(240 3.8% 46.1%);
      --accent: hsl(240 4.8% 95.9%);
      --accent-foreground: hsl(240 5.9% 10%);
      --destructive: hsl(0 84.2% 60.2%);
      --destructive-foreground: hsl(0 0% 98%);
      --border: hsl(240 5.9% 90%);
      --input: hsl(240 5.9% 90%);
      --ring: hsl(240 5.9% 10%);
      --radius: 0.5rem;
      --green: hsl(142 76% 36%);
      --green-bg: hsl(142 76% 36% / 0.1);
      --amber: hsl(38 92% 50%);
      --amber-bg: hsl(38 92% 50% / 0.1);
      --blue: hsl(221 83% 53%);
      --blue-bg: hsl(221 83% 53% / 0.1);
      --sidebar-width: 280px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--background);
      color: var(--foreground);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 99px;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Topbar ── */
    .topbar {
      height: 56px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      background: var(--background);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar-logo {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .topbar-logo svg {
      color: var(--muted-foreground);
    }

    .topbar-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
    }

    .topbar-title {
      font-size: 14px;
      color: var(--muted-foreground);
      font-weight: 400;
    }

    .topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 99px;
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted-foreground);
      background: var(--muted);
    }

    .topbar-badge span {
      font-weight: 600;
      color: var(--foreground);
      font-variant-numeric: tabular-nums;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      height: 36px;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .btn-default {
      background: var(--primary);
      color: var(--primary-foreground);
      border-color: var(--primary);
    }

    .btn-default:hover {
      opacity: .9;
    }

    .btn-outline {
      background: var(--background);
      color: var(--foreground);
      border-color: var(--border);
    }

    .btn-outline:hover {
      background: var(--accent);
    }

    .btn-ghost {
      background: transparent;
      color: var(--foreground);
      border-color: transparent;
    }

    .btn-ghost:hover {
      background: var(--accent);
    }

    .btn-sm {
      height: 30px;
      padding: 0 10px;
      font-size: 12px;
    }

    .btn-icon {
      width: 36px;
      padding: 0;
      justify-content: center;
    }

    .btn-icon.btn-sm {
      width: 30px;
      height: 30px;
    }

    .btn svg {
      flex-shrink: 0;
    }

    /* ── Body layout ── */
    .body {
      display: flex;
      flex: 1;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 56px;
      height: calc(100vh - 56px);
      overflow-y: auto;
      padding: 16px 0;
    }

    .sidebar-section {
      padding: 0 16px 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    .sidebar-section:last-child {
      border-bottom: none;
    }

    .sidebar-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted-foreground);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 8px;
      padding: 8px 0 4px;
    }

    .sidebar-reset {
      margin-top: 8px;
      width: 100%;
    }

    /* ── Filter chips ── */
    .filter-chips {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .fchip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      transition: all .1s;
      border: 1px solid transparent;
      background: transparent;
      color: var(--foreground);
      font-family: inherit;
      text-align: left;
      width: 100%;
    }

    .fchip:hover {
      background: var(--muted);
    }

    .fchip.active {
      background: var(--primary);
      color: var(--primary-foreground);
    }

    .fchip .fcount {
      font-size: 11px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      opacity: .7;
    }

    .fchip.active .fcount {
      opacity: .8;
    }

    /* ── Opleiding checkboxes ── */
    .opl-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      max-height: 280px;
      overflow-y: auto;
    }

    .opl-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 12.5px;
      transition: background .1s;
      user-select: none;
    }

    .opl-item:hover {
      background: var(--muted);
    }

    .opl-item input[type=checkbox] {
      width: 14px;
      height: 14px;
      accent-color: var(--foreground);
      cursor: pointer;
      flex-shrink: 0;
    }

    .opl-item .opl-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .opl-item .opl-count {
      font-size: 11px;
      color: var(--muted-foreground);
      font-variant-numeric: tabular-nums;
    }

    /* ── Main content ── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* ── Content toolbar ── */
    .content-toolbar {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      position: sticky;
      top: 56px;
      z-index: 40;
      background: var(--background);
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 360px;
    }

    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted-foreground);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      height: 36px;
      padding: 0 12px 0 32px;
      border: 1px solid var(--input);
      border-radius: var(--radius);
      background: var(--background);
      color: var(--foreground);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }

    .search-input:focus {
      border-color: var(--ring);
      box-shadow: 0 0 0 2px hsl(240 5.9% 10% / .1);
    }

    .search-input::placeholder {
      color: var(--muted-foreground);
    }

    .toolbar-right {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-left: auto;
    }

    .sort-select {
      height: 36px;
      padding: 0 10px;
      border: 1px solid var(--input);
      border-radius: var(--radius);
      background: var(--background);
      color: var(--foreground);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      cursor: pointer;
      transition: border-color .15s;
    }

    .sort-select:focus {
      border-color: var(--ring);
    }

    /* ── Active filters bar ── */
    .active-bar {
      padding: 8px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      min-height: 0;
    }

    .active-bar:empty {
      display: none;
    }

    .af-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 99px;
      border: 1px solid var(--border);
      font-size: 12px;
      background: var(--secondary);
      color: var(--secondary-foreground);
    }

    .af-tag button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted-foreground);
      line-height: 1;
      font-size: 14px;
      padding: 0 0 0 2px;
      transition: color .1s;
    }

    .af-tag button:hover {
      color: var(--foreground);
    }

    .af-label {
      font-size: 12px;
      color: var(--muted-foreground);
    }

    /* ── Results area ── */
    .results {
      padding: 20px 24px;
    }

    /* ── Stats row ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      background: var(--card);
    }

    .stat-n {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -.03em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .stat-n.green {
      color: var(--green);
    }

    .stat-n.blue {
      color: var(--blue);
    }

    .stat-n.amber {
      color: var(--amber);
    }

    .stat-l {
      font-size: 12px;
      color: var(--muted-foreground);
      margin-top: 4px;
    }

    /* ── Section ── */
    .section {
      margin-bottom: 28px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 1px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--secondary);
      color: var(--secondary-foreground);
    }

    .badge-green {
      background: var(--green-bg);
      color: var(--green);
      border-color: transparent;
    }

    .badge-blue {
      background: var(--blue-bg);
      color: var(--blue);
      border-color: transparent;
    }

    .badge-amber {
      background: var(--amber-bg);
      color: var(--amber);
      border-color: transparent;
    }

    .badge-outline {
      background: transparent;
    }

    .sec-btn {
      margin-left: auto;
    }

    /* ── Cards grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 10px;
    }

    /* ── Card ── */
    .card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: box-shadow .15s, border-color .15s;
      animation: fadeUp .2s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card:hover {
      border-color: hsl(240 5.9% 78%);
      box-shadow: 0 2px 8px hsl(240 5.9% 10% / .06);
    }

    .card-header {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius);
      flex-shrink: 0;
      border: 1px solid var(--border);
      background: var(--secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--foreground);
    }

    .card-info {
      flex: 1;
      min-width: 0;
    }

    .card-company {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-opleiding {
      font-size: 11.5px;
      color: var(--muted-foreground);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-badges {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .card-fields {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field {
      display: flex;
      gap: 10px;
      align-items: baseline;
      font-size: 12.5px;
    }

    .field-label {
      color: var(--muted-foreground);
      min-width: 48px;
      flex-shrink: 0;
      font-size: 11px;
    }

    .field-value {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .field-value a {
      color: var(--foreground);
      text-decoration: none;
      font-weight: 500;
    }

    .field-value a:hover {
      text-decoration: underline;
    }

    .field-nil {
      color: var(--muted-foreground);
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    .card-checks {
      display: flex;
      gap: 12px;
      flex: 1;
    }

    .chk-label {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      font-size: 12px;
      color: var(--muted-foreground);
      user-select: none;
      transition: color .1s;
    }

    .chk-label input {
      width: 13px;
      height: 13px;
      accent-color: var(--foreground);
      cursor: pointer;
    }

    .chk-label:has(input:checked) {
      color: var(--foreground);
      font-weight: 500;
    }

    /* ── Table view ── */
    .table-wrap {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .tbl {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .tbl thead th {
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted-foreground);
      border-bottom: 1px solid var(--border);
      background: var(--secondary);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      position: sticky;
      top: 112px;
      z-index: 5;
    }

    .tbl thead th:hover {
      color: var(--foreground);
    }

    .tbl thead th.s {
      color: var(--foreground);
    }

    .tbl tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }

    .tbl tbody tr:last-child {
      border-bottom: none;
    }

    .tbl tbody tr:hover {
      background: var(--muted);
    }

    .tbl td {
      padding: 10px 14px;
      vertical-align: middle;
    }

    .td-n {
      color: var(--muted-foreground);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      width: 28px;
    }

    /* ── Loading/Error states ── */
    .state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 14px;
      padding: 32px;
    }

    .state-icon {
      width: 48px;
      height: 48px;
      border: 2px solid var(--border);
      border-top-color: var(--foreground);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .state-title {
      font-size: 16px;
      font-weight: 600;
    }

    .state-desc {
      font-size: 13px;
      color: var(--muted-foreground);
      text-align: center;
      max-width: 360px;
      line-height: 1.6;
    }

    .state-files {
      font-size: 12px;
      color: var(--muted-foreground);
      text-align: center;
      line-height: 1.8;
      font-variant-numeric: tabular-nums;
    }

    .state-error .state-icon {
      border: none;
      width: auto;
      height: auto;
      animation: none;
      font-size: 36px;
    }

    .state-code {
      font-size: 12px;
      font-family: ui-monospace, monospace;
      background: var(--secondary);
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: var(--radius);
      color: var(--muted-foreground);
      max-width: 400px;
      text-align: center;
    }

    /* ── Empty ── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 8px;
      color: var(--muted-foreground);
    }

    .empty svg {
      opacity: .3;
      margin-bottom: 4px;
    }

    .empty-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--foreground);
    }

    /* ── Separator ── */
    .sep {
      width: 1px;
      height: 16px;
      background: var(--border);
    }

    /* ── View toggle ── */
    .view-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .vbtn {
      background: none;
      border: none;
      color: var(--muted-foreground);
      padding: 6px 10px;
      cursor: pointer;
      transition: all .1s;
      display: flex;
      align-items: center;
    }

    .vbtn:hover {
      background: var(--muted);
      color: var(--foreground);
    }

    .vbtn.active {
      background: var(--secondary);
      color: var(--foreground);
    }

    .vbtn+.vbtn {
      border-left: 1px solid var(--border);
    }

    /* ── Spinner on refresh ── */
    .spin {
      animation: spin .7s linear infinite;
    }

    @media (max-width: 900px) {
      .sidebar {
        display: none;
      }

      .topbar,
      .content-toolbar,
      .results {
        padding-left: 16px;
        padding-right: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-logo">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path
            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
        </svg>
        Stagemarkt
      </div>
      <div class="topbar-sep"></div>
      <div class="topbar-title">Dashboard</div>
      <div class="topbar-right" id="topbarRight" style="display:none">
        <div class="topbar-badge"><span id="hTotal">0</span> vacatures</div>
        <div class="topbar-badge"><span id="hEmail">0</span> emails</div>
        <div class="topbar-badge"><span id="hOpl">0</span> opleidingen</div>
        <button class="btn btn-outline btn-sm" id="refreshBtn" onclick="loadData(true)">
          <svg id="refreshIcon" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"
            viewBox="0 0 24 24">
            <path d="M23 4v6h-6" />
            <path d="M1 20v-6h6" />
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
          </svg>
          Vernieuwen
        </button>
      </div>
    </header>

    <div class="body">
      <!-- Sidebar filters -->
      <aside class="sidebar" id="sidebar">

        <div class="sidebar-section">
          <div class="sidebar-label">Leerweg</div>
          <div class="filter-chips" id="leerwegFilters">
            <button class="fchip" data-g="leerweg" data-v="BOL">BOL <span class="fcount" id="cnt-bol">0</span></button>
            <button class="fchip" data-g="leerweg" data-v="BBL">BBL <span class="fcount" id="cnt-bbl">0</span></button>
          </div>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-label">Niveau</div>
          <div class="filter-chips">
            <button class="fchip" data-g="niveau" data-v="4">MBO niveau 4 <span class="fcount"
                id="cnt-n4">0</span></button>
            <button class="fchip" data-g="niveau" data-v="3">MBO niveau 3 <span class="fcount"
                id="cnt-n3">0</span></button>
            <button class="fchip" data-g="niveau" data-v="2">MBO niveau 2 <span class="fcount"
                id="cnt-n2">0</span></button>
            <button class="fchip" data-g="niveau" data-v="1">MBO niveau 1 <span class="fcount"
                id="cnt-n1">0</span></button>
          </div>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-label">Contact</div>
          <div class="filter-chips">
            <button class="fchip" data-g="contact" data-v="email">Heeft email <span class="fcount"
                id="cnt-email">0</span></button>
            <button class="fchip" data-g="contact" data-v="tel">Heeft telefoon <span class="fcount"
                id="cnt-tel">0</span></button>
          </div>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-label">Vergoeding</div>
          <div class="filter-chips">
            <button class="fchip" data-g="verg" data-v="ja">Met vergoeding <span class="fcount"
                id="cnt-verg">0</span></button>
            <button class="fchip" data-g="verg" data-v="nee">Zonder vergoeding</button>
          </div>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-label">Opleiding</div>
          <div class="opl-list" id="opleidingList"></div>
          <button class="btn btn-ghost btn-sm sidebar-reset" id="resetOplBtn" style="display:none"
            onclick="resetOpleidingen()">Alle opleidingen tonen</button>
        </div>

        <div class="sidebar-section">
          <button class="btn btn-outline btn-sm sidebar-reset" onclick="resetAll()">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
              <path d="M3 3v5h5" />
            </svg>
            Alle filters wissen
          </button>
        </div>

      </aside>

      <!-- Main content -->
      <main class="content">
        <div id="appRoot"></div>
        <div id="mainUI" style="display:none">
          <div class="content-toolbar">
            <div class="search-wrap">
              <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.35-4.35" />
              </svg>
              <input class="search-input" id="searchInput" placeholder="Zoek op bedrijf, email, adres...">
            </div>
            <div class="toolbar-right">
              <select class="sort-select" id="sortSel">
                <option value="">Sorteer op...</option>
                <option value="az">Bedrijf A → Z</option>
                <option value="za">Bedrijf Z → A</option>
                <option value="verg-hi">Vergoeding hoog → laag</option>
                <option value="verg-lo">Vergoeding laag → hoog</option>
                <option value="niveau-hi">Niveau hoog → laag</option>
                <option value="stad">Stad A → Z</option>
                <option value="email-first">Email eerst</option>
                <option value="opleiding">Opleiding A → Z</option>
              </select>
              <div class="sep"></div>
              <div class="view-toggle">
                <button class="vbtn active" id="btnCards" title="Kaartweergave">
                  <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="7" rx="1" />
                    <rect x="14" y="3" width="7" height="7" rx="1" />
                    <rect x="3" y="14" width="7" height="7" rx="1" />
                    <rect x="14" y="14" width="7" height="7" rx="1" />
                  </svg>
                </button>
                <button class="vbtn" id="btnTable" title="Tabelweergave">
                  <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                  </svg>
                </button>
              </div>
              <div class="sep"></div>
              <span id="resultCount" style="font-size:12px;color:var(--muted-foreground)">0 resultaten</span>
            </div>
          </div>
          <div class="active-bar" id="activeBar"></div>
          <div class="results">
            <div class="stats-grid" id="statsGrid"></div>
            <div id="resultsArea"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    // ── Config ────────────────────────────────────────────────────────────────
    const REPO = 'HA2614/Stage-info';
    const BRANCH = 'main';
    const FOLDER = 'info';

    // ── State ─────────────────────────────────────────────────────────────────
    let allData = [];
    let filters = {};                // { leerweg:'BOL', niveau:'4', ... }
    let oplFilter = new Set();         // empty = all, otherwise only these
    let sortMode = '';
    let viewMode = 'cards';
    let checks = {};
    try { checks = JSON.parse(localStorage.getItem('sm_ck3') || '{}'); } catch (_) { }

    // ── Loading helpers ───────────────────────────────────────────────────────
    function showState(html) { document.getElementById('appRoot').innerHTML = html; }
    function showMain() { document.getElementById('mainUI').style.display = 'block'; document.getElementById('appRoot').innerHTML = ''; }

    function stateLoading(title, sub, files) {
      showState(`<div class="state">
    <div class="state-icon"></div>
    <div class="state-title">${title}</div>
    <div class="state-desc">${sub || ''}</div>
    ${files ? `<div class="state-files">${files}</div>` : ''}
  </div>`);
    }

    function stateError(msg, detail) {
      showState(`<div class="state state-error">
    <div class="state-icon">⚠️</div>
    <div class="state-title">Kon data niet laden</div>
    <div class="state-desc">${msg}</div>
    ${detail ? `<div class="state-code">${detail}</div>` : ''}
    <button class="btn btn-default" onclick="loadData(true)">Opnieuw proberen</button>
  </div>`);
    }

    // ── Data loading ──────────────────────────────────────────────────────────
    async function loadData(force) {
      const btn = document.getElementById('refreshBtn');
      const icon = document.getElementById('refreshIcon');
      if (btn) btn.disabled = true;
      if (icon) icon.classList.add('spin');
      document.getElementById('mainUI').style.display = 'none';
      document.getElementById('topbarRight').style.display = 'none';

      stateLoading('Data ophalen uit GitHub...', `${REPO}/${FOLDER}`);

      try {
        const bust = force ? `?t=${Date.now()}` : '';
        const listRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${FOLDER}${bust}`);
        if (!listRes.ok) throw new Error(`GitHub API: ${listRes.status} — controleer of de repo publiek is en de info/ map bestaat.`);

        const files = await listRes.json();
        const jsonFiles = files.filter(f => f.name.endsWith('.json'));
        if (!jsonFiles.length) throw new Error(`Geen .json bestanden gevonden in ${FOLDER}/`);

        stateLoading(`${jsonFiles.length} bestanden laden...`, 'Vacatures ophalen', jsonFiles.map(f => `📄 ${f.name}`).join('<br>'));

        const settled = await Promise.allSettled(
          jsonFiles.map(f =>
            fetch(`https://raw.githubusercontent.com/${REPO}/${BRANCH}/${FOLDER}/${f.name}${bust}`)
              .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
              .then(d => Array.isArray(d) ? d : [d])
          )
        );

        allData = [];
        settled.forEach((r, i) => {
          if (r.status === 'fulfilled') allData.push(...r.value);
          else console.warn('Kon niet laden:', jsonFiles[i].name, r.reason);
        });

        if (!allData.length) throw new Error('Alle bestanden zijn leeg of ongeldig JSON.');

        allData = allData.map((r, i) => ({
          ...r,
          _id: i,
          _vn: parseVerg(r.vergoeding),
          _nn: parseNiv(r.niveau),
        }));

        // Reset filters
        filters = {};
        oplFilter = new Set();
        sortMode = '';

        showMain();
        document.getElementById('topbarRight').style.display = 'flex';
        updateTopbar();
        updateSidebarCounts();
        buildOpleidingList();
        render();

      } catch (e) {
        stateError('Controleer of de repo publiek is en de info/ map bestaat.', e.message);
      }

      if (btn) btn.disabled = false;
      if (icon) icon.classList.remove('spin');
    }

    // ── Parse helpers ─────────────────────────────────────────────────────────
    function parseVerg(v) {
      if (!v || v === '—' || v === 'Niet van toepassing') return -1;
      const nums = (v.match(/\d[\d.,]*/g) || []).map(s => parseFloat(s.replace(',', '.')));
      return nums.length ? nums.reduce((a, b) => a + b, 0) / nums.length : -1;
    }
    function parseNiv(n) {
      if (!n) return 0;
      const s = n.toString();
      if (s.includes('5') || s.toLowerCase().includes('hbo')) return 5;
      if (s.includes('4')) return 4;
      if (s.includes('3')) return 3;
      if (s.includes('2')) return 2;
      if (s.includes('1')) return 1;
      return 0;
    }
    function shortNiv(n) { return (n || '—').replace('MBO niveau ', 'Niv '); }
    function nivBadgeClass(nn) {
      if (nn >= 4) return 'badge-green';
      if (nn === 3) return 'badge-blue';
      if (nn === 2) return 'badge-amber';
      return 'badge-outline';
    }
    function lwBadgeClass(lw) {
      if (!lw || lw === '—') return '';
      return (lw.toUpperCase().includes('BOL')) ? 'badge-blue' : 'badge-amber';
    }

    // ── Topbar ────────────────────────────────────────────────────────────────
    function updateTopbar() {
      document.getElementById('hTotal').textContent = allData.length;
      document.getElementById('hEmail').textContent = allData.filter(r => r.email && r.email !== '—').length;
      const opls = new Set(allData.map(r => r.opleiding).filter(o => o && o !== '—'));
      document.getElementById('hOpl').textContent = opls.size;
    }

    // ── Sidebar counts ────────────────────────────────────────────────────────
    function updateSidebarCounts() {
      const d = allData;
      const set = (id, n) => { const el = document.getElementById(id); if (el) el.textContent = n; };
      set('cnt-bol', d.filter(r => (r.leerweg || '').toUpperCase().includes('BOL')).length);
      set('cnt-bbl', d.filter(r => (r.leerweg || '').toUpperCase().includes('BBL')).length);
      set('cnt-n4', d.filter(r => r._nn === 4).length);
      set('cnt-n3', d.filter(r => r._nn === 3).length);
      set('cnt-n2', d.filter(r => r._nn === 2).length);
      set('cnt-n1', d.filter(r => r._nn === 1).length);
      set('cnt-email', d.filter(r => r.email && r.email !== '—').length);
      set('cnt-tel', d.filter(r => r.telefoon && r.telefoon !== '—').length);
      set('cnt-verg', d.filter(r => r._vn > 0).length);
    }

    // ── Opleiding list ────────────────────────────────────────────────────────
    function buildOpleidingList() {
      const counts = {};
      allData.forEach(r => {
        const o = r.opleiding && r.opleiding !== '—' ? r.opleiding : 'Overige';
        counts[o] = (counts[o] || 0) + 1;
      });
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
      document.getElementById('opleidingList').innerHTML = sorted.map(([o, c]) => `
    <label class="opl-item">
      <input type="checkbox" data-opl="${encodeURIComponent(o)}" ${oplFilter.size === 0 || oplFilter.has(o) ? 'checked' : ''} onchange="toggleOpl(this)">
      <span class="opl-name" title="${o}">${o}</span>
      <span class="opl-count">${c}</span>
    </label>`).join('');
    }

    function toggleOpl(cb) {
      const name = decodeURIComponent(cb.dataset.opl);
      // If all were checked (oplFilter empty), uncheck all except this one
      if (oplFilter.size === 0) {
        const all = [...document.querySelectorAll('#opleidingList input')];
        all.forEach(c => { c.checked = false; });
        cb.checked = true;
        oplFilter = new Set([name]);
      } else {
        if (cb.checked) oplFilter.add(name);
        else oplFilter.delete(name);
        // If all are now checked, reset to empty (= all)
        const all = [...document.querySelectorAll('#opleidingList input')];
        if (oplFilter.size === all.length) { oplFilter = new Set(); all.forEach(c => c.checked = true); }
      }
      document.getElementById('resetOplBtn').style.display = oplFilter.size > 0 ? 'inline-flex' : 'none';
      render();
    }

    function resetOpleidingen() {
      oplFilter = new Set();
      document.querySelectorAll('#opleidingList input').forEach(c => c.checked = true);
      document.getElementById('resetOplBtn').style.display = 'none';
      render();
    }

    // ── Filter + Sort ─────────────────────────────────────────────────────────
    function getFiltered() {
      const q = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();
      let d = allData.filter(r => {
        // Search
        if (q) {
          const hay = [r.bedrijfsnaam, r.stageTitle, r.adres, r.email, r.stad, r.opleiding, r.telefoon, r.vergoeding].join(' ').toLowerCase();
          if (!hay.includes(q)) return false;
        }
        // Opleiding filter
        if (oplFilter.size > 0) {
          const o = r.opleiding && r.opleiding !== '—' ? r.opleiding : 'Overige';
          if (!oplFilter.has(o)) return false;
        }
        // Sidebar filters
        if (filters.leerweg && !(r.leerweg || '').toUpperCase().includes(filters.leerweg)) return false;
        if (filters.niveau && r._nn !== parseInt(filters.niveau)) return false;
        if (filters.contact === 'email' && (!r.email || r.email === '—')) return false;
        if (filters.contact === 'tel' && (!r.telefoon || r.telefoon === '—')) return false;
        if (filters.verg === 'ja' && r._vn <= 0) return false;
        if (filters.verg === 'nee' && r._vn > 0) return false;
        return true;
      });

      // Sort
      if (sortMode === 'az') d.sort((a, b) => (a.bedrijfsnaam || '').localeCompare(b.bedrijfsnaam || ''));
      else if (sortMode === 'za') d.sort((a, b) => (b.bedrijfsnaam || '').localeCompare(a.bedrijfsnaam || ''));
      else if (sortMode === 'verg-hi') d.sort((a, b) => b._vn - a._vn);
      else if (sortMode === 'verg-lo') d.sort((a, b) => { if (a._vn < 0 && b._vn < 0) return 0; if (a._vn < 0) return 1; if (b._vn < 0) return -1; return a._vn - b._vn; });
      else if (sortMode === 'niveau-hi') d.sort((a, b) => b._nn - a._nn);
      else if (sortMode === 'stad') d.sort((a, b) => (a.stad || '').localeCompare(b.stad || ''));
      else if (sortMode === 'email-first') d.sort((a, b) => (a.email && a.email !== '—' ? 0 : 1) - (b.email && b.email !== '—' ? 0 : 1));
      else if (sortMode === 'opleiding') d.sort((a, b) => (a.opleiding || '').localeCompare(b.opleiding || ''));

      return d;
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function render() {
      updateActiveTags();
      const d = getFiltered();
      const rc = document.getElementById('resultCount');
      if (rc) rc.textContent = `${d.length} resultaten`;
      renderStats(d);
      viewMode === 'table' ? renderTable(d) : renderCards(d);
    }

    function renderStats(d) {
      const wv = d.filter(r => r._vn > 0);
      const gem = wv.length ? Math.round(wv.reduce((a, r) => a + r._vn, 0) / wv.length) : 0;
      const bol = d.filter(r => (r.leerweg || '').toUpperCase().includes('BOL')).length;
      const bbl = d.filter(r => (r.leerweg || '').toUpperCase().includes('BBL')).length;
      document.getElementById('statsGrid').innerHTML = [
        `<div class="stat-card"><div class="stat-n">${d.length}</div><div class="stat-l">Vacatures</div></div>`,
        `<div class="stat-card"><div class="stat-n green">${d.filter(r => r.email && r.email !== '—').length}</div><div class="stat-l">Met email</div></div>`,
        `<div class="stat-card"><div class="stat-n green">${d.filter(r => r.telefoon && r.telefoon !== '—').length}</div><div class="stat-l">Met telefoon</div></div>`,
        `<div class="stat-card"><div class="stat-n amber">${wv.length}</div><div class="stat-l">Met vergoeding</div></div>`,
        gem > 0 ? `<div class="stat-card"><div class="stat-n amber">€${gem}</div><div class="stat-l">Gem. vergoeding</div></div>` : '',
        bol > 0 ? `<div class="stat-card"><div class="stat-n blue">${bol}</div><div class="stat-l">BOL</div></div>` : '',
        bbl > 0 ? `<div class="stat-card"><div class="stat-n amber">${bbl}</div><div class="stat-l">BBL</div></div>` : '',
      ].join('');
    }

    function renderCards(d) {
      if (!d.length) { document.getElementById('resultsArea').innerHTML = emptyHtml(); return; }

      // Group by opleiding → niveau
      const groups = {};
      d.forEach(r => {
        const opl = r.opleiding && r.opleiding !== '—' ? r.opleiding : 'Overige';
        const niv = r.niveau && r.niveau !== '—' ? r.niveau : 'Onbekend niveau';
        const key = `${String(r._nn).padStart(2, '0')}|${opl}|${niv}`;
        if (!groups[key]) groups[key] = { opl, niv, nn: r._nn, items: [] };
        groups[key].items.push(r);
      });

      const sorted = Object.values(groups).sort((a, b) => b.nn - a.nn || a.opl.localeCompare(b.opl));

      document.getElementById('resultsArea').innerHTML = sorted.map(g => {
        const gid = 'g' + Math.random().toString(36).slice(2, 8);
        const cards = g.items.map(r => cardHtml(r)).join('');
        return `<div class="section">
      <div class="section-header">
        <h2 class="section-title">${g.opl}</h2>
        <span class="badge ${nivBadgeClass(g.nn)}">${shortNiv(g.niv)}</span>
        <span class="badge">${g.items.length} vacatures</span>
        <button class="btn btn-ghost btn-sm sec-btn" onclick="toggleSec('${gid}',this)">Inklappen</button>
      </div>
      <div class="cards-grid" id="${gid}">${cards}</div>
    </div>`;
      }).join('');
      bindChecks();
    }

    function cardHtml(r) {
      const id = r._id;
      const init = (r.bedrijfsnaam || '?')[0].toUpperCase();
      const email = r.email && r.email !== '—' ? `<a href="mailto:${r.email}">${r.email}</a>` : '<span class="field-nil">—</span>';
      const tel = r.telefoon && r.telefoon !== '—' ? `<a href="tel:${r.telefoon}">${r.telefoon}</a>` : '<span class="field-nil">—</span>';

      const lwb = r.leerweg && r.leerweg !== '—' ? `<span class="badge ${lwBadgeClass(r.leerweg)}">${r.leerweg}</span>` : '';
      const nivb = r.niveau && r.niveau !== '—' ? `<span class="badge ${nivBadgeClass(r._nn)}">${shortNiv(r.niveau)}</span>` : '';
      const vergb = r._vn > 0
        ? `<span class="badge badge-green">${r.vergoeding}</span>`
        : `<span class="badge badge-outline" style="color:var(--muted-foreground)">Geen vergoeding</span>`;

      const gb = checks[`g${id}`] ? 'checked' : '', rb = checks[`r${id}`] ? 'checked' : '', ab = checks[`a${id}`] ? 'checked' : '';

      // Extract just the opleiding part for subtitle (format is "Opleiding — Bedrijf")
      const opleiding = r.opleiding && r.opleiding !== '—' ? r.opleiding : '';

      return `<div class="card">
    <div class="card-header">
      <div class="card-icon">${init}</div>
      <div class="card-info">
        <div class="card-company">${r.bedrijfsnaam || '—'}</div>
        ${opleiding ? `<div class="card-opleiding">${opleiding}</div>` : ''}
      </div>
    </div>
    <div class="card-badges">${lwb}${nivb}${vergb}</div>
    <div class="card-fields">
      <div class="field"><span class="field-label">Adres</span><span class="field-value ${!r.adres || r.adres === '—' ? 'field-nil' : ''}">${r.adres || '—'}</span></div>
      <div class="field"><span class="field-label">Email</span><span class="field-value">${email}</span></div>
      <div class="field"><span class="field-label">Tel</span><span class="field-value">${tel}</span></div>
      <div class="field"><span class="field-label">Stad</span><span class="field-value ${!r.stad || r.stad === '—' ? 'field-nil' : ''}">${r.stad || '—'}</span></div>
    </div>
    <div class="card-footer">
      <div class="card-checks">
        <label class="chk-label"><input type="checkbox" data-ck="g${id}" ${gb}><span>Gebeld</span></label>
        <label class="chk-label"><input type="checkbox" data-ck="r${id}" ${rb}><span>Reactie</span></label>
        <label class="chk-label"><input type="checkbox" data-ck="a${id}" ${ab}><span>Aangenomen</span></label>
      </div>
      ${r.url ? `<a class="btn btn-outline btn-sm" href="${r.url}" target="_blank" style="text-decoration:none">Bekijk ↗</a>` : ''}
    </div>
  </div>`;
    }

    function renderTable(d) {
      if (!d.length) { document.getElementById('resultsArea').innerHTML = emptyHtml(); return; }
      const sc = k => sortMode === k ? 's' : '';
      const so = k => `onclick="document.getElementById('sortSel').value='${k}';sortMode='${k}';render()"`;
      const rows = d.map((r, i) => {
        const email = r.email && r.email !== '—' ? `<a href="mailto:${r.email}">${r.email}</a>` : '<span style="color:var(--muted-foreground)">—</span>';
        const lw = r.leerweg && r.leerweg !== '—' ? `<span class="badge ${lwBadgeClass(r.leerweg)}">${r.leerweg}</span>` : '—';
        const vg = r._vn > 0 ? `<span class="badge badge-green">${r.vergoeding}</span>` : '<span style="color:var(--muted-foreground)">—</span>';
        const lk = r.url ? `<a class="btn btn-outline btn-sm" href="${r.url}" target="_blank" style="text-decoration:none">↗</a>` : '';
        return `<tr>
      <td class="td-n">${i + 1}</td>
      <td><span style="font-weight:500">${r.bedrijfsnaam || '—'}</span></td>
      <td style="color:var(--muted-foreground);font-size:12px">${r.opleiding || '—'}</td>
      <td><span class="badge ${nivBadgeClass(r._nn)}">${shortNiv(r.niveau || '—')}</span></td>
      <td>${lw}</td>
      <td style="color:var(--muted-foreground);font-size:12px">${r.stad || '—'}</td>
      <td style="font-size:12px">${email}</td>
      <td style="font-size:12px;color:var(--muted-foreground)">${r.telefoon && r.telefoon !== '—' ? r.telefoon : '—'}</td>
      <td>${vg}</td>
      <td>${lk}</td>
    </tr>`;
      }).join('');
      document.getElementById('resultsArea').innerHTML = `
    <div class="table-wrap">
      <table class="tbl">
        <thead><tr>
          <th class="td-n">#</th>
          <th class="${sc('az')}" ${so('az')}>Bedrijf</th>
          <th class="${sc('opleiding')}" ${so('opleiding')}>Opleiding</th>
          <th class="${sc('niveau-hi')}" ${so('niveau-hi')}>Niveau</th>
          <th>Leerweg</th>
          <th class="${sc('stad')}" ${so('stad')}>Stad</th>
          <th class="${sc('email-first')}" ${so('email-first')}>Email</th>
          <th>Telefoon</th>
          <th class="${sc('verg-hi')}" ${so('verg-hi')}>Vergoeding</th>
          <th>Link</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
    }

    function emptyHtml() {
      return `<div class="empty">
    <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <div class="empty-title">Geen resultaten gevonden</div>
    <div>Pas je filters of zoekopdracht aan</div>
  </div>`;
    }

    // ── Section toggle ────────────────────────────────────────────────────────
    function toggleSec(id, btn) {
      const el = document.getElementById(id);
      if (!el) return;
      const hidden = el.style.display === 'none';
      el.style.display = hidden ? 'grid' : 'none';
      btn.textContent = hidden ? 'Inklappen' : 'Uitklappen';
    }

    // ── Active tags ───────────────────────────────────────────────────────────
    function updateActiveTags() {
      const labels = { leerweg: 'Leerweg', niveau: 'Niveau', contact: 'Contact', verg: 'Vergoeding' };
      const tags = [
        ...Object.entries(filters).map(([k, v]) =>
          `<span class="af-tag">${labels[k] || k}: <strong>${v}</strong><button onclick="removeFilter('${k}')">×</button></span>`
        ),
        oplFilter.size > 0 ? `<span class="af-tag">${oplFilter.size} opleiding${oplFilter.size > 1 ? 'en' : ''}<button onclick="resetOpleidingen()">×</button></span>` : '',
      ].filter(Boolean).join('');

      const bar = document.getElementById('activeBar');
      if (bar) bar.innerHTML = tags ? `<span class="af-label">Actieve filters:</span>${tags}` : '';
    }

    function removeFilter(k) {
      delete filters[k];
      document.querySelectorAll(`[data-g="${k}"]`).forEach(b => b.classList.remove('active'));
      render();
    }

    function resetAll() {
      filters = {};
      oplFilter = new Set();
      document.querySelectorAll('.fchip').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('#opleidingList input').forEach(c => c.checked = true);
      document.getElementById('resetOplBtn').style.display = 'none';
      document.getElementById('searchInput').value = '';
      document.getElementById('sortSel').value = '';
      sortMode = '';
      render();
    }

    // ── Checkboxes ────────────────────────────────────────────────────────────
    function bindChecks() {
      document.querySelectorAll('input[data-ck]').forEach(cb => {
        cb.addEventListener('change', () => {
          checks[cb.dataset.ck] = cb.checked;
          localStorage.setItem('sm_ck3', JSON.stringify(checks));
        });
      });
    }

    // ── Events ────────────────────────────────────────────────────────────────
    document.getElementById('searchInput').addEventListener('input', render);
    document.getElementById('sortSel').addEventListener('change', function () { sortMode = this.value; render(); });

    document.querySelectorAll('.fchip').forEach(btn => {
      btn.addEventListener('click', () => {
        const g = btn.dataset.g, v = btn.dataset.v;
        if (filters[g] === v) {
          delete filters[g]; btn.classList.remove('active');
        } else {
          document.querySelectorAll(`[data-g="${g}"]`).forEach(b => b.classList.remove('active'));
          filters[g] = v; btn.classList.add('active');
        }
        render();
      });
    });

    document.getElementById('btnCards').addEventListener('click', () => {
      viewMode = 'cards';
      document.getElementById('btnCards').classList.add('active');
      document.getElementById('btnTable').classList.remove('active');
      render();
    });
    document.getElementById('btnTable').addEventListener('click', () => {
      viewMode = 'table';
      document.getElementById('btnTable').classList.add('active');
      document.getElementById('btnCards').classList.remove('active');
      render();
    });

    // ── Boot ──────────────────────────────────────────────────────────────────
    loadData();
  </script>
</body>

</html>
