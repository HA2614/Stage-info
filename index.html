<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stagemarkt Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;
  --surface:#111118;
  --card:#16161f;
  --card2:#1c1c28;
  --border:#252535;
  --border2:#333348;
  --text:#f0f0f8;
  --muted:#7070a0;
  --muted2:#454565;
  --accent:#6c5ce7;
  --accent2:#a29bfe;
  --green:#00d68f;
  --green-bg:rgba(0,214,143,.1);
  --amber:#fdcb6e;
  --amber-bg:rgba(253,203,110,.1);
  --red:#ff7675;
  --blue:#74b9ff;
  --pink:#fd79a8;
  --radius:8px;
  --radius-lg:14px;
}

html{scroll-behavior:smooth}
body{font-family:'Syne',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── Noise overlay ── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.4;
}

/* ── Header ── */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,15,.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 32px;
  display:flex;align-items:center;gap:20px;height:60px;
}
.logo{font-size:16px;font-weight:800;letter-spacing:-.02em;color:var(--text)}
.logo span{color:var(--accent2)}
.header-badge{
  background:var(--accent);color:#fff;
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:3px 8px;border-radius:20px;
}
.header-stats{margin-left:auto;display:flex;gap:20px;align-items:center}
.hstat{text-align:right}
.hstat-n{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent2)}
.hstat-l{font-size:10px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}

/* ── Drop zone ── */
.dropzone{
  margin:32px auto;max-width:1400px;padding:0 32px;
}
.drop-area{
  border:2px dashed var(--border2);border-radius:var(--radius-lg);
  padding:48px;text-align:center;cursor:pointer;
  transition:all .2s;background:var(--surface);
  position:relative;overflow:hidden;
}
.drop-area::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%, rgba(108,92,231,.08), transparent 70%);
  pointer-events:none;
}
.drop-area:hover,.drop-area.drag-over{border-color:var(--accent);background:rgba(108,92,231,.06)}
.drop-icon{font-size:40px;margin-bottom:12px;display:block}
.drop-title{font-size:18px;font-weight:700;margin-bottom:6px}
.drop-sub{font-size:13px;color:var(--muted)}
.drop-sub b{color:var(--accent2)}
.drop-input{position:absolute;inset:0;opacity:0;cursor:pointer}
.folder-btn{
  display:inline-flex;align-items:center;gap:8px;margin-top:16px;
  background:var(--accent);color:#fff;border:none;
  padding:10px 20px;border-radius:var(--radius);
  font-family:'Syne',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;
}
.folder-btn:hover{background:#7d6ef0;transform:translateY(-1px)}

/* ── Main layout ── */
.main{max-width:1400px;margin:0 auto;padding:0 32px 48px;display:none}
.main.visible{display:block}

/* ── Control bar ── */
.controlbar{
  display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;
  padding:20px 0 16px;border-bottom:1px solid var(--border);margin-bottom:20px;
}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.search-input{
  width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);
  font-family:'Syne',sans-serif;font-size:13px;padding:9px 12px 9px 36px;
  outline:none;transition:border-color .15s;
}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted2)}

.filter-group{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;align-self:center;margin-right:2px}
.filter-chip{
  background:var(--card);border:1px solid var(--border);
  color:var(--muted);padding:6px 12px;border-radius:20px;
  font-family:'Syne',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.filter-chip:hover{border-color:var(--border2);color:var(--text)}
.filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-chip.bol.active{background:var(--blue);border-color:var(--blue);color:#000}
.filter-chip.bbl.active{background:var(--amber);border-color:var(--amber);color:#000}

.sort-select{
  background:var(--card);border:1px solid var(--border);
  color:var(--text);padding:8px 12px;border-radius:var(--radius);
  font-family:'Syne',sans-serif;font-size:12px;outline:none;cursor:pointer;
}
.sort-select:focus{border-color:var(--accent)}

/* ── Active filters bar ── */
.active-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;min-height:0}
.af-tag{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(108,92,231,.15);border:1px solid rgba(108,92,231,.3);
  color:var(--accent2);padding:4px 10px;border-radius:20px;font-size:11px;
}
.af-tag button{background:none;border:none;color:var(--accent2);cursor:pointer;padding:0;line-height:1;font-size:13px}

/* ── Section headers ── */
.section{margin-bottom:32px}
.section-header{
  display:flex;align-items:center;gap:12px;
  padding:12px 0 10px;border-bottom:1px solid var(--border);margin-bottom:16px;
}
.section-title{font-size:15px;font-weight:700;letter-spacing:-.01em}
.section-badge{
  font-family:'DM Mono',monospace;font-size:11px;
  background:var(--card2);border:1px solid var(--border);
  color:var(--muted);padding:2px 8px;border-radius:20px;
}
.section-level{
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:3px 8px;border-radius:20px;
}
.level-4{background:rgba(108,92,231,.2);color:var(--accent2)}
.level-3{background:rgba(116,185,255,.2);color:var(--blue)}
.level-2{background:rgba(253,203,110,.2);color:var(--amber)}
.level-1{background:rgba(255,118,117,.2);color:var(--red)}
.level-hbo{background:rgba(0,214,143,.2);color:var(--green)}
.section-toggle{
  margin-left:auto;background:none;border:1px solid var(--border);
  color:var(--muted);padding:4px 10px;border-radius:var(--radius);
  font-family:'Syne',sans-serif;font-size:11px;cursor:pointer;transition:all .15s;
}
.section-toggle:hover{border-color:var(--border2);color:var(--text)}

/* ── Cards grid ── */
.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:12px;
}

/* ── Vacancy card ── */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:16px;
  transition:all .2s;cursor:default;
  position:relative;overflow:hidden;
  animation:cardIn .3s ease both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--pink));
  opacity:0;transition:opacity .2s;
}
.card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.card:hover::before{opacity:1}

.card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
.card-avatar{
  width:36px;height:36px;border-radius:8px;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--pink));
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:#fff;text-transform:uppercase;
}
.card-head{flex:1;min-width:0}
.card-company{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-title{font-size:11.5px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.card-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap}
.chip-verg{background:var(--green-bg);color:var(--green);border:1px solid rgba(0,214,143,.2)}
.chip-bol{background:rgba(116,185,255,.12);color:var(--blue);border:1px solid rgba(116,185,255,.2)}
.chip-bbl{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(253,203,110,.2)}
.chip-level{background:rgba(108,92,231,.12);color:var(--accent2);border:1px solid rgba(108,92,231,.2)}
.chip-nil{background:var(--card2);color:var(--muted2);border:1px solid var(--border)}

.card-meta{display:flex;flex-direction:column;gap:5px;font-size:11.5px}
.card-row{display:flex;gap:8px;align-items:baseline}
.card-row-label{color:var(--muted2);min-width:52px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0}
.card-row-val{color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.card-row-val a{color:var(--accent2);text-decoration:none}
.card-row-val a:hover{text-decoration:underline}
.card-row-val.nil{color:var(--muted2)}

.card-footer{
  display:flex;gap:8px;margin-top:12px;padding-top:10px;
  border-top:1px solid var(--border);align-items:center;
}
.card-actions{display:flex;gap:5px;margin-left:auto}
.btn-card{
  background:var(--card2);border:1px solid var(--border);
  color:var(--text);padding:5px 10px;border-radius:6px;
  font-family:'Syne',sans-serif;font-size:11px;font-weight:500;
  cursor:pointer;transition:all .15s;text-decoration:none;display:inline-block;
}
.btn-card:hover{background:var(--border);text-decoration:none}
.btn-card.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-card.primary:hover{background:#7d6ef0}

/* Status checkboxes on card */
.card-status{display:flex;gap:10px}
.chk-label{display:flex;align-items:center;gap:4px;cursor:pointer;font-size:10.5px;color:var(--muted);user-select:none}
.chk-label input{accent-color:var(--green);width:11px;height:11px}
.chk-label:has(input:checked){color:var(--green)}
.chk-label.chk-aangenomen:has(input:checked){color:var(--amber)}

/* ── Empty state ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}

/* ── Stats overview ── */
.stats-row{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;margin-bottom:24px;
}
.stat-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;
  transition:transform .2s;
}
.stat-card:hover{transform:translateY(-2px)}
.stat-n{font-size:24px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-.03em}
.stat-n.g{color:var(--green)}
.stat-n.a{color:var(--accent2)}
.stat-n.y{color:var(--amber)}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:3px}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── View toggle ── */
.view-toggle{display:flex;gap:4px;border:1px solid var(--border);border-radius:var(--radius);padding:2px}
.view-btn{background:none;border:none;color:var(--muted);padding:5px 8px;border-radius:5px;cursor:pointer;transition:all .15s}
.view-btn.active{background:var(--card2);color:var(--text)}

/* ── Table view ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{
  background:var(--card);padding:9px 12px;text-align:left;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;
  position:sticky;top:60px;z-index:4;cursor:pointer;user-select:none;
}
thead th:hover{color:var(--text)}
thead th .sort-arrow{margin-left:4px;opacity:.4}
thead th.sorted .sort-arrow{opacity:1;color:var(--accent2)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--card)}
td{padding:9px 12px;vertical-align:middle}
.td-n{color:var(--muted2);width:30px;font-family:'DM Mono',monospace;font-size:11px}

/* ── Animations ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fade-in{animation:fadeIn .4s ease}

/* ── Responsive ── */
@media(max-width:768px){
  .header{padding:0 16px}
  .main,.dropzone{padding-left:16px;padding-right:16px}
  .cards-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">Stage<span>markt</span></div>
  <div class="header-badge">Dashboard</div>
  <div class="header-stats" id="headerStats" style="display:none">
    <div class="hstat"><div class="hstat-n" id="hTotal">0</div><div class="hstat-l">Vacatures</div></div>
    <div class="hstat"><div class="hstat-n" id="hEmail">0</div><div class="hstat-l">Emails</div></div>
    <div class="hstat"><div class="hstat-n" id="hTel">0</div><div class="hstat-l">Telefoons</div></div>
    <div class="hstat"><div class="hstat-n" id="hOpl">0</div><div class="hstat-l">Opleidingen</div></div>
  </div>
</header>

<div class="dropzone" id="dropzone">
  <div class="drop-area" id="dropArea">
    <input type="file" class="drop-input" id="fileInput" multiple accept=".json" webkitdirectory>
    <span class="drop-icon">📂</span>
    <div class="drop-title">Sleep je JSON bestanden hierheen</div>
    <div class="drop-sub">Of selecteer de <b>info/</b> map met je gescrapete resultaten</div>
    <button class="folder-btn" onclick="document.getElementById('fileInput').click();event.stopPropagation()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      Selecteer map of bestanden
    </button>
  </div>
</div>

<div class="main" id="mainContent">

  <!-- Stats -->
  <div class="stats-row" id="statsRow"></div>

  <!-- Controls -->
  <div class="controlbar">
    <div class="search-wrap">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" type="text" id="searchInput" placeholder="Zoek op bedrijf, email, adres, stad...">
    </div>

    <div class="filter-group">
      <span class="filter-label">Leerweg</span>
      <button class="filter-chip bol" data-filter="leerweg" data-val="BOL">BOL</button>
      <button class="filter-chip bbl" data-filter="leerweg" data-val="BBL">BBL</button>
    </div>

    <div class="filter-group">
      <span class="filter-label">Niveau</span>
      <button class="filter-chip" data-filter="niveau" data-val="MBO niveau 4">Niv 4</button>
      <button class="filter-chip" data-filter="niveau" data-val="MBO niveau 3">Niv 3</button>
      <button class="filter-chip" data-filter="niveau" data-val="MBO niveau 2">Niv 2</button>
      <button class="filter-chip" data-filter="niveau" data-val="MBO niveau 1">Niv 1</button>
    </div>

    <div class="filter-group">
      <span class="filter-label">Vergoeding</span>
      <button class="filter-chip" data-filter="vergoeding" data-val="met">Met vergoeding</button>
    </div>

    <div class="filter-group">
      <span class="filter-label">Contact</span>
      <button class="filter-chip" data-filter="contact" data-val="email">Heeft email</button>
      <button class="filter-chip" data-filter="contact" data-val="tel">Heeft telefoon</button>
    </div>

    <select class="sort-select" id="sortSelect">
      <option value="default">Sortering: Standaard</option>
      <option value="az">Bedrijf A → Z</option>
      <option value="za">Bedrijf Z → A</option>
      <option value="verg-hoog">Vergoeding: Hoog → Laag</option>
      <option value="verg-laag">Vergoeding: Laag → Hoog</option>
      <option value="niveau">Niveau (hoog → laag)</option>
      <option value="stad">Stad A → Z</option>
      <option value="email">Email eerst</option>
    </select>

    <div class="view-toggle">
      <button class="view-btn active" id="viewCards" title="Kaarten">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </button>
      <button class="view-btn" id="viewTable" title="Tabel">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </div>

  <!-- Active filters -->
  <div class="active-filters" id="activeFilters"></div>

  <!-- Results -->
  <div id="resultsArea"></div>
</div>

<script>
let allData = [];
let activeFilters = {};
let currentSort = 'default';
let currentView = 'cards';
let tableSortCol = null;
let tableSortDir = 1;
let savedChecks = {};
try { savedChecks = JSON.parse(localStorage.getItem('sm_dash_checks') || '{}'); } catch(_) {}

// ── File loading ──────────────────────────────────────────────────────────
const dropArea = document.getElementById('dropArea');
const fileInput = document.getElementById('fileInput');

dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('drag-over'); });
dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
dropArea.addEventListener('drop', e => {
  e.preventDefault();
  dropArea.classList.remove('drag-over');
  handleFiles([...e.dataTransfer.files]);
});
fileInput.addEventListener('change', () => handleFiles([...fileInput.files]));

async function handleFiles(files) {
  const jsonFiles = files.filter(f => f.name.endsWith('.json'));
  if (!jsonFiles.length) { alert('Geen .json bestanden gevonden.'); return; }

  allData = [];
  for (const f of jsonFiles) {
    try {
      const text = await f.text();
      const parsed = JSON.parse(text);
      const items = Array.isArray(parsed) ? parsed : [parsed];
      allData.push(...items);
    } catch(e) { console.warn('Kon niet parsen:', f.name, e); }
  }

  if (!allData.length) { alert('Geen geldige vacatures gevonden in de bestanden.'); return; }

  // Normalize
  allData = allData.map((r, i) => ({
    ...r,
    _id: i,
    _verg_num: parseVergoeding(r.vergoeding),
    _niveau_num: parseNiveau(r.niveau),
  }));

  document.getElementById('dropzone').style.display = 'none';
  document.getElementById('mainContent').classList.add('visible');
  document.getElementById('headerStats').style.display = 'flex';
  updateHeaderStats();
  renderStats();
  render();
}

// ── Parsers ───────────────────────────────────────────────────────────────
function parseVergoeding(v) {
  if (!v || v === '—') return -1;
  const nums = v.match(/\d[\d.,]*/g);
  if (!nums) return -1;
  const values = nums.map(n => parseFloat(n.replace(',','.')));
  return values.reduce((a,b) => a+b, 0) / values.length;
}

function parseNiveau(n) {
  if (!n) return 0;
  if (n.includes('4') || n.toLowerCase().includes('hbo')) return 4;
  if (n.includes('3')) return 3;
  if (n.includes('2')) return 2;
  if (n.includes('1')) return 1;
  return 0;
}

function getLevelClass(n) {
  if (!n) return '';
  if (n.includes('4')) return 'level-4';
  if (n.toLowerCase().includes('hbo')) return 'level-hbo';
  if (n.includes('3')) return 'level-3';
  if (n.includes('2')) return 'level-2';
  if (n.includes('1')) return 'level-1';
  return '';
}

// ── Stats ─────────────────────────────────────────────────────────────────
function updateHeaderStats() {
  document.getElementById('hTotal').textContent = allData.length;
  document.getElementById('hEmail').textContent = allData.filter(r => r.email && r.email !== '—').length;
  document.getElementById('hTel').textContent = allData.filter(r => r.telefoon && r.telefoon !== '—').length;
  const opls = new Set(allData.map(r => r.opleiding).filter(o => o && o !== '—'));
  document.getElementById('hOpl').textContent = opls.size;
}

function renderStats() {
  const data = allData;
  const byNiveau = {};
  data.forEach(r => {
    const n = r.niveau || 'Onbekend';
    byNiveau[n] = (byNiveau[n]||0)+1;
  });
  const bolCount = data.filter(r => r.leerweg && r.leerweg.toUpperCase().includes('BOL')).length;
  const bblCount = data.filter(r => r.leerweg && r.leerweg.toUpperCase().includes('BBL')).length;
  const vergCount = data.filter(r => r._verg_num > 0).length;
  const gemVerg = vergCount > 0 ? Math.round(data.filter(r=>r._verg_num>0).reduce((a,r)=>a+r._verg_num,0)/vergCount) : 0;

  const html = [
    `<div class="stat-card"><div class="stat-n a">${data.length}</div><div class="stat-l">Totaal vacatures</div></div>`,
    `<div class="stat-card"><div class="stat-n g">${data.filter(r=>r.email&&r.email!=='—').length}</div><div class="stat-l">Met email</div></div>`,
    `<div class="stat-card"><div class="stat-n g">${data.filter(r=>r.telefoon&&r.telefoon!=='—').length}</div><div class="stat-l">Met telefoon</div></div>`,
    `<div class="stat-card"><div class="stat-n y">${vergCount}</div><div class="stat-l">Met vergoeding</div></div>`,
    gemVerg > 0 ? `<div class="stat-card"><div class="stat-n y">€${gemVerg}</div><div class="stat-l">Gem. vergoeding</div></div>` : '',
    bolCount > 0 ? `<div class="stat-card"><div class="stat-n" style="color:var(--blue)">${bolCount}</div><div class="stat-l">BOL</div></div>` : '',
    bblCount > 0 ? `<div class="stat-card"><div class="stat-n" style="color:var(--amber)">${bblCount}</div><div class="stat-l">BBL</div></div>` : '',
    ...Object.entries(byNiveau).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([n,c]) =>
      `<div class="stat-card"><div class="stat-n a">${c}</div><div class="stat-l">${n}</div></div>`
    ),
  ].join('');
  document.getElementById('statsRow').innerHTML = html;
}

// ── Filter & Sort ─────────────────────────────────────────────────────────
function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let data = allData.filter(r => {
    if (q) {
      const hay = [r.bedrijfsnaam, r.stageTitle, r.adres, r.email, r.telefoon, r.stad, r.opleiding].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    // Leerweg
    if (activeFilters.leerweg) {
      const lw = (r.leerweg || '').toUpperCase();
      if (!lw.includes(activeFilters.leerweg)) return false;
    }
    // Niveau
    if (activeFilters.niveau) {
      if ((r.niveau || '') !== activeFilters.niveau) return false;
    }
    // Vergoeding
    if (activeFilters.vergoeding === 'met') {
      if (r._verg_num <= 0) return false;
    }
    // Contact
    if (activeFilters.contact === 'email') {
      if (!r.email || r.email === '—') return false;
    }
    if (activeFilters.contact === 'tel') {
      if (!r.telefoon || r.telefoon === '—') return false;
    }
    return true;
  });

  // Sort
  const s = currentSort;
  if (s === 'az') data.sort((a,b) => (a.bedrijfsnaam||'').localeCompare(b.bedrijfsnaam||''));
  else if (s === 'za') data.sort((a,b) => (b.bedrijfsnaam||'').localeCompare(a.bedrijfsnaam||''));
  else if (s === 'verg-hoog') data.sort((a,b) => b._verg_num - a._verg_num);
  else if (s === 'verg-laag') data.sort((a,b) => {
    if (a._verg_num < 0 && b._verg_num < 0) return 0;
    if (a._verg_num < 0) return 1;
    if (b._verg_num < 0) return -1;
    return a._verg_num - b._verg_num;
  });
  else if (s === 'niveau') data.sort((a,b) => b._niveau_num - a._niveau_num);
  else if (s === 'stad') data.sort((a,b) => (a.stad||'').localeCompare(b.stad||''));
  else if (s === 'email') data.sort((a,b) => {
    const ae = a.email && a.email !== '—' ? 0 : 1;
    const be = b.email && b.email !== '—' ? 0 : 1;
    return ae - be;
  });

  return data;
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  renderActiveFilters();
  const data = getFiltered();

  if (currentView === 'table') {
    renderTable(data);
    return;
  }

  // Group by opleiding + niveau
  const groups = {};
  data.forEach(r => {
    const opl = r.opleiding && r.opleiding !== '—' ? r.opleiding : 'Overige';
    const niv = r.niveau && r.niveau !== '—' ? r.niveau : 'Onbekend niveau';
    const key = `${niv}___${opl}`;
    if (!groups[key]) groups[key] = { opleiding: opl, niveau: niv, items: [] };
    groups[key].items.push(r);
  });

  // Sort groups: niveau desc, then opleiding asc
  const sortedGroups = Object.values(groups).sort((a,b) => {
    const nd = parseNiveau(b.niveau) - parseNiveau(a.niveau);
    if (nd !== 0) return nd;
    return a.opleiding.localeCompare(b.opleiding);
  });

  if (sortedGroups.length === 0) {
    document.getElementById('resultsArea').innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">Geen resultaten</div>
        <p>Probeer andere filters of zoektermen.</p>
      </div>`;
    return;
  }

  const html = sortedGroups.map(g => {
    const lvlClass = getLevelClass(g.niveau);
    const cards = g.items.map(r => renderCard(r)).join('');
    const gid = 'g_' + Math.random().toString(36).slice(2);
    return `
      <div class="section">
        <div class="section-header">
          <div class="section-title">${g.opleiding}</div>
          <span class="section-level ${lvlClass}">${g.niveau}</span>
          <span class="section-badge">${g.items.length} vacatures</span>
          <button class="section-toggle" onclick="toggleSection('${gid}')">Inklappen</button>
        </div>
        <div class="cards-grid" id="${gid}">${cards}</div>
      </div>`;
  }).join('');

  document.getElementById('resultsArea').innerHTML = html;
  loadCheckboxStates();
  bindCheckboxes();
}

function toggleSection(id) {
  const el = document.getElementById(id);
  const btn = el?.previousElementSibling?.querySelector('.section-toggle');
  if (!el) return;
  const hidden = el.style.display === 'none';
  el.style.display = hidden ? 'grid' : 'none';
  if (btn) btn.textContent = hidden ? 'Inklappen' : 'Uitklappen';
}

function renderCard(r) {
  const initial = (r.bedrijfsnaam || '?')[0].toUpperCase();
  const colors = ['135deg,#6c5ce7,#a29bfe','135deg,#00d68f,#00b4d8','135deg,#fd79a8,#e17055','135deg,#fdcb6e,#e17055','135deg,#74b9ff,#0984e3'];
  const ci = r.bedrijfsnaam ? r.bedrijfsnaam.charCodeAt(0) % colors.length : 0;

  const email = r.email && r.email !== '—'
    ? `<a href="mailto:${r.email}">${r.email}</a>`
    : '<span class="nil">—</span>';
  const tel = r.telefoon && r.telefoon !== '—'
    ? `<a href="tel:${r.telefoon}">${r.telefoon}</a>`
    : '<span class="nil">—</span>';

  const leerwegChip = r.leerweg
    ? `<span class="chip ${r.leerweg.toUpperCase().includes('BOL') ? 'chip-bol' : 'chip-bbl'}">${r.leerweg}</span>`
    : '';
  const vergChip = r._verg_num > 0
    ? `<span class="chip chip-verg">€ ${r.vergoeding}</span>`
    : `<span class="chip chip-nil">Geen verg.</span>`;
  const levelChip = r.niveau && r.niveau !== '—'
    ? `<span class="chip chip-level">${r.niveau}</span>`
    : '';

  const id = r._id;
  const gb = savedChecks[`g_${id}`] ? 'checked' : '';
  const re = savedChecks[`r_${id}`] ? 'checked' : '';
  const aa = savedChecks[`a_${id}`] ? 'checked' : '';

  return `<div class="card">
    <div class="card-top">
      <div class="card-avatar" style="background:linear-gradient(${colors[ci]})">${initial}</div>
      <div class="card-head">
        <div class="card-company">${r.bedrijfsnaam || '—'}</div>
        <div class="card-title">${r.stageTitle && r.stageTitle !== '—' ? r.stageTitle : '—'}</div>
      </div>
    </div>
    <div class="card-chips">${leerwegChip}${levelChip}${vergChip}</div>
    <div class="card-meta">
      <div class="card-row"><span class="card-row-label">Adres</span><span class="card-row-val ${r.adres==='—'?'nil':''}">${r.adres||'—'}</span></div>
      <div class="card-row"><span class="card-row-label">Email</span><span class="card-row-val">${email}</span></div>
      <div class="card-row"><span class="card-row-label">Tel</span><span class="card-row-val">${tel}</span></div>
      <div class="card-row"><span class="card-row-label">Stad</span><span class="card-row-val ${!r.stad||r.stad==='—'?'nil':''}">${r.stad||'—'}</span></div>
    </div>
    <div class="card-footer">
      <div class="card-status">
        <label class="chk-label"><input type="checkbox" data-ck="g_${id}" ${gb}><span>Gebeld</span></label>
        <label class="chk-label"><input type="checkbox" data-ck="r_${id}" ${re}><span>Reactie</span></label>
        <label class="chk-label chk-aangenomen"><input type="checkbox" data-ck="a_${id}" ${aa}><span>Aangenomen</span></label>
      </div>
      <div class="card-actions">
        ${r.url ? `<a class="btn-card primary" href="${r.url}" target="_blank">Bekijk</a>` : ''}
      </div>
    </div>
  </div>`;
}

function renderTable(data) {
  if (!data.length) {
    document.getElementById('resultsArea').innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Geen resultaten</div></div>`;
    return;
  }
  const cols = [
    {key:'_n', label:'#', sortKey:null},
    {key:'bedrijfsnaam', label:'Bedrijf', sortKey:'az'},
    {key:'opleiding', label:'Opleiding', sortKey:'opleiding'},
    {key:'niveau', label:'Niveau', sortKey:'niveau'},
    {key:'leerweg', label:'Leerweg', sortKey:'leerweg'},
    {key:'stad', label:'Stad', sortKey:'stad'},
    {key:'email', label:'Email', sortKey:'email'},
    {key:'telefoon', label:'Tel'},
    {key:'vergoeding', label:'Vergoeding', sortKey:'verg-hoog'},
    {key:'_link', label:'Link'},
  ];
  const ths = cols.map(c => {
    const arrow = c.sortKey ? `<span class="sort-arrow">↕</span>` : '';
    const sorted = currentSort === c.sortKey ? 'sorted' : '';
    const click = c.sortKey ? `onclick="document.getElementById('sortSelect').value='${c.sortKey}';currentSort='${c.sortKey}';render()"` : '';
    return `<th class="${sorted}" ${click}>${c.label}${arrow}</th>`;
  }).join('');

  const rows = data.map((r, i) => {
    const email = r.email && r.email !== '—' ? `<a href="mailto:${r.email}">${r.email}</a>` : '<span class="nil">—</span>';
    const tel = r.telefoon && r.telefoon !== '—' ? `<a href="tel:${r.telefoon}">${r.telefoon}</a>` : '—';
    const verg = r._verg_num > 0 ? `<span class="chip chip-verg">€ ${r.vergoeding}</span>` : '<span class="nil">—</span>';
    const lw = r.leerweg ? `<span class="chip ${r.leerweg.toUpperCase().includes('BOL')?'chip-bol':'chip-bbl'}">${r.leerweg}</span>` : '—';
    const link = r.url ? `<a class="btn-card" href="${r.url}" target="_blank">↗</a>` : '';
    return `<tr>
      <td class="td-n">${i+1}</td>
      <td><strong style="font-size:12px">${r.bedrijfsnaam||'—'}</strong></td>
      <td style="font-size:11px;color:var(--muted)">${r.opleiding||'—'}</td>
      <td><span class="chip chip-level ${getLevelClass(r.niveau)}" style="font-size:10px">${r.niveau||'—'}</span></td>
      <td>${lw}</td>
      <td style="color:var(--muted);font-size:11px">${r.stad||'—'}</td>
      <td style="font-size:11px">${email}</td>
      <td style="font-size:11px">${tel}</td>
      <td>${verg}</td>
      <td>${link}</td>
    </tr>`;
  }).join('');

  document.getElementById('resultsArea').innerHTML = `
    <div class="table-wrap">
      <table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>
    </div>`;
}

// ── Active filters render ──────────────────────────────────────────────────
function renderActiveFilters() {
  const af = document.getElementById('activeFilters');
  const tags = Object.entries(activeFilters).map(([k, v]) => `
    <span class="af-tag">${k}: <b>${v}</b>
      <button onclick="removeFilter('${k}')">×</button>
    </span>`).join('');
  af.innerHTML = tags;
}

function removeFilter(key) {
  delete activeFilters[key];
  document.querySelectorAll(`[data-filter="${key}"]`).forEach(b => b.classList.remove('active'));
  render();
}

// ── Checkboxes ─────────────────────────────────────────────────────────────
function loadCheckboxStates() {
  document.querySelectorAll('input[data-ck]').forEach(cb => {
    if (savedChecks[cb.dataset.ck]) cb.checked = true;
  });
}
function bindCheckboxes() {
  document.querySelectorAll('input[data-ck]').forEach(cb => {
    cb.addEventListener('change', () => {
      savedChecks[cb.dataset.ck] = cb.checked;
      localStorage.setItem('sm_dash_checks', JSON.stringify(savedChecks));
    });
  });
}

// ── Event listeners ────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', () => render());

document.getElementById('sortSelect').addEventListener('change', function() {
  currentSort = this.value;
  render();
});

document.querySelectorAll('.filter-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    const filter = btn.dataset.filter;
    const val = btn.dataset.val;
    if (activeFilters[filter] === val) {
      delete activeFilters[filter];
      btn.classList.remove('active');
    } else {
      // Remove other active buttons in same group
      document.querySelectorAll(`[data-filter="${filter}"]`).forEach(b => b.classList.remove('active'));
      activeFilters[filter] = val;
      btn.classList.add('active');
    }
    render();
  });
});

document.getElementById('viewCards').addEventListener('click', () => {
  currentView = 'cards';
  document.getElementById('viewCards').classList.add('active');
  document.getElementById('viewTable').classList.remove('active');
  render();
});
document.getElementById('viewTable').addEventListener('click', () => {
  currentView = 'table';
  document.getElementById('viewTable').classList.add('active');
  document.getElementById('viewCards').classList.remove('active');
  render();
});
</script>
</body>
</html>
